name: srm-credit-engine

# End-to-end local stack: Postgres + FastAPI backend + nginx-served frontend.
# Start with:    docker compose up --build
# Stop with:     docker compose down
# Reset data:    docker compose down -v

services:
  db:
    image: postgres:16-alpine
    container_name: srm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-srm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srm}
      POSTGRES_DB: ${POSTGRES_DB:-srm_credit}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srm} -d ${POSTGRES_DB:-srm_credit}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: srm-credit-engine/backend:local
    container_name: srm-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: srm-credit-engine
      APP_VERSION: 1.0.0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: "true"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost,http://localhost:5173,http://localhost:8080}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-srm}:${POSTGRES_PASSWORD:-srm}@db:5432/${POSTGRES_DB:-srm_credit}
      DATABASE_POOL_SIZE: "10"
      DATABASE_MAX_OVERFLOW: "5"
      DATABASE_ECHO: "false"
      PROMETHEUS_ENABLED: "true"
      OTEL_SERVICE_NAME: srm-credit-engine
      BASE_RATE_MONTHLY: "0.01"
      RUN_MIGRATIONS: "true"
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: srm-credit-engine/frontend:local
    container_name: srm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  pg-data:
    name: srm-credit-engine_pg-data
