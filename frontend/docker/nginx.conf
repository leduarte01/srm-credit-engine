server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Use Docker's embedded DNS so upstream hostnames are resolved at
    # request time (not at nginx startup), which is required when the
    # backend container starts after this one.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Lightweight healthcheck so docker can verify the container is up.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reverse-proxy API calls to the backend service. The rewrite strips
    # /api so the backend receives /v1/... as its router expects.
    location /api/ {
        rewrite            ^/api/(.*)$ /$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SPA fallback: every unknown route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
