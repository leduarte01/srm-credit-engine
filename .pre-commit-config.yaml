# Pre-commit hooks for the SRM Credit Engine repo.
# Install once with:    pip install pre-commit && pre-commit install
# Run on all files:     pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        name: ruff (format)
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend lint
        language: system
        entry: bash -c 'cd frontend && npm run lint'
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-format
        name: frontend format check
        language: system
        entry: bash -c 'cd frontend && npm run format:check'
        files: ^frontend/.*\.(ts|tsx|js|jsx|css|md|json)$
        pass_filenames: false
        stages: [pre-commit]
