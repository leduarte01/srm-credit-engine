name: docker

on:
  push:
    branches: [main]
    paths:
      - 'backend/Dockerfile'
      - 'backend/docker/**'
      - 'frontend/Dockerfile'
      - 'frontend/docker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'backend/Dockerfile'
      - 'backend/docker/**'
      - 'frontend/Dockerfile'
      - 'frontend/docker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker.yml'

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: false
          tags: srm-credit-engine/${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  compose:
    name: validate compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
